<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工作日誌</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f4f8;min-height:100vh;color:#2d3748}
.header{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.header h1{font-size:1.4rem;font-weight:700}
.container{max-width:860px;margin:0 auto;padding:20px 16px}
.user-switch{background:#edf2f7;border-radius:12px;padding:12px 20px;margin-bottom:20px;display:flex;align-items:center;gap:12px;box-shadow:inset 0 2px 4px rgba(0,0,0,.05)}
.user-switch span{font-size:.9rem;font-weight:600;color:#4a5568}
.user-switch select{flex:1;border:1.5px solid #cbd5e0;border-radius:8px;padding:6px 12px;font-size:.9rem;outline:none;background:white}
.user-switch button{padding:6px 14px;background:#718096;color:white;border:none;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:600}
.add-form{background:white;border-radius:12px;padding:20px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.form-row{display:flex;gap:10px;flex-wrap:wrap}
.form-row input,.form-row textarea,.form-row select{border:1.5px solid #e2e8f0;border-radius:8px;padding:9px 12px;font-size:.9rem;outline:none;font-family:inherit}
.input-title{flex:1;min-width:180px}
.input-desc{width:100%;margin-top:8px;resize:vertical;min-height:60px}
.btn{padding:9px 18px;border:none;border-radius:8px;cursor:pointer;font-size:.88rem;font-weight:600;transition:all .15s}
.btn-add{background:#667eea;color:white;margin-top:8px}
.btn-add:hover{background:#5a67d8}
.filters{display:flex;gap:8px;margin-bottom:16px}
.filter-btn{padding:6px 14px;border:1.5px solid #e2e8f0;border-radius:20px;background:white;cursor:pointer;font-size:.82rem;font-weight:500;color:#4a5568}
.filter-btn.active{background:#667eea;border-color:#667eea;color:white}
.date-nav{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.date-nav button{background:white;border:1.5px solid #e2e8f0;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:.85rem}
.date-nav input[type=date]{border:1.5px solid #e2e8f0;border-radius:8px;padding:6px 10px;font-size:.85rem}
.tasks-list{display:flex;flex-direction:column;gap:10px}
.task-card{background:white;border-radius:10px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.07);display:flex;align-items:flex-start;gap:12px}
.status-badge{display:inline-flex;padding:3px 10px;border-radius:12px;font-size:.75rem;font-weight:600;white-space:nowrap}
.badge-todo{background:#fed7d7;color:#c53030}
.badge-in_progress{background:#fefcbf;color:#b7791f}
.badge-done{background:#c6f6d5;color:#276749}
.task-body{flex:1}
.task-title{font-weight:600;font-size:.95rem;margin-bottom:3px}
.task-user{font-size:.7rem;color:#718096;background:#edf2f7;padding:2px 6px;border-radius:4px;display:inline-block;margin-bottom:4px}
.task-desc{color:#718096;font-size:.83rem;margin-bottom:6px;white-space:pre-wrap}
.task-actions{display:flex;gap:6px}
.btn-sm{padding:4px 10px;border:1.5px solid #e2e8f0;border-radius:6px;background:white;cursor:pointer;font-size:.78rem}
.empty{text-align:center;padding:40px;color:#a0aec0}
</style>
</head>
<body>
<div class="header">
<h1>&#128218; 工作日誌</h1>
<div id="todayLabel" style="font-size:0.9rem"></div>
</div>
<div class="container">
<div class="user-switch">
<span>&#128100; 當前用戶:</span>
<select id="currentUserSelect" onchange="switchUser(this.value)"></select>
<button onclick="addUser()">+ 新增用戶</button>
</div>
<div class="add-form">
<div class="form-row">
<input class="input-title" type="text" id="titleInput" placeholder="工作標題（必填）" />
<select id="statusInput">
<option value="todo">未完成</option>
<option value="in_progress">進行中</option>
<option value="done">已完成</option>
</select>
<input type="date" id="dateInput" />
</div>
<textarea class="input-desc" id="descInput" placeholder="工作詳情（選填）"></textarea>
<button class="btn btn-add" onclick="addTask()">新增記錄</button>
</div>
<div class="date-nav">
<button onclick="changeDate(-1)">前一天</button>
<input type="date" id="filterDate" onchange="loadTasks()" />
<button onclick="changeDate(1)">後一天</button>
</div>
<div class="filters">
<button class="filter-btn active" id="f-all" onclick="setFilter('all')">全部</button>
<button class="filter-btn" id="f-todo" onclick="setFilter('todo')">未完成</button>
<button class="filter-btn" id="f-in_progress" onclick="setFilter('in_progress')">進行中</button>
<button class="filter-btn" id="f-done" onclick="setFilter('done')">已完成</button>
</div>
<div class="tasks-list" id="tasksList"></div>
</div>
<script>
const SUPABASE_URL='https://opfuiqjlsqrxxpvvrwnp.supabase.co';
const SUPABASE_KEY='sb_publishable_ke6yX6yt3h402n-feQ6RaA_18N8_Vmy';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let currentFilter='all';
let allTasks=[];
let users=JSON.parse(localStorage.getItem('diary_users')||'["默认用户"]');
let currentUser=localStorage.getItem('diary_current_user')||users[0];
function saveUsers(){localStorage.setItem('diary_users',JSON.stringify(users));localStorage.setItem('diary_current_user',currentUser);}
function updateHeaderDate(){const d=new Date();document.getElementById('todayLabel').textContent=`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;}
function initUsers(){
const sel=document.getElementById('currentUserSelect');
sel.innerHTML=users.map(u=>`<option value="${u}" ${u===currentUser?'selected':''}>${u}</option>`).join('');
}
function switchUser(val){currentUser=val;saveUsers();loadTasks();}
function addUser(){
const name=prompt('請輸入新用戶名稱：');
if(name && !users.includes(name)){users.push(name);currentUser=name;saveUsers();initUsers();loadTasks();}
}
function today(){return new Date().toISOString().slice(0,10);}
document.getElementById('filterDate').value=today();
document.getElementById('dateInput').value=today();
function setFilter(f){
currentFilter=f;
document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
document.getElementById('f-'+f).classList.add('active');
renderTasks();
}
function changeDate(d){
const cur=new Date(document.getElementById('filterDate').value+'T00:00:00');
cur.setDate(cur.getDate()+d);
document.getElementById('filterDate').value=cur.toISOString().slice(0,10);
loadTasks();
}
async function loadTasks(){
const date=document.getElementById('filterDate').value;
const {data,error}=await sb.from('tasks').select('*').eq('date',date).order('created_at',{ascending:false});
allTasks=data||[];
renderTasks();
}
function renderTasks(){
const list=document.getElementById('tasksList');
const filtered=(currentFilter==='all'?allTasks:allTasks.filter(t=>t.status===currentFilter)).filter(t=>t.description && t.description.startsWith('[USER:'+currentUser+']'));
if(!filtered.length){list.innerHTML='<div class="empty">暫無用戶 '+currentUser+' 的記錄</div>';return;}
list.innerHTML=filtered.map(t=>`
<div class="task-card">
<div class="task-body">
<div class="task-user">${currentUser}</div>
<div class="task-title">${esc(t.title)}</div>
<div class="task-desc">${esc(t.description.replace('[USER:'+currentUser+']',''))}</div>
</div>
<div class="task-actions">
<select class="btn-sm" onchange="updateStatus(${t.id},this.value)">
<option value="todo" ${t.status==='todo'?'selected':''}>未完成</option>
<option value="in_progress" ${t.status==='in_progress'?'selected':''}>進行中</option>
<option value="done" ${t.status==='done'?'selected':''}>已完成</option>
</select>
<button class="btn-sm" style="color:red" onclick="deleteTask(${t.id})">刪除</button>
</div>
<span class="status-badge badge-${t.status}">${t.status}</span>
</div>`).join('');
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
async function addTask(){
const title=document.getElementById('titleInput').value.trim();
const desc=document.getElementById('descInput').value.trim();
const status=document.getElementById('statusInput').value;
const date=document.getElementById('dateInput').value;
if(!title)return;
const fullDesc=`[USER:${currentUser}]${desc}`;
await sb.from('tasks').insert([{title,description:fullDesc,status,date}]);
document.getElementById('titleInput').value='';
document.getElementById('descInput').value='';
loadTasks();
}
async function updateStatus(id,status){await sb.from('tasks').update({status}).eq('id',id);loadTasks();}
async function deleteTask(id){if(confirm('確定刪除？')){await sb.from('tasks').delete().eq('id',id);loadTasks();}}
updateHeaderDate();initUsers();loadTasks();
</script>
</body>
</html>
